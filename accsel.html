<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 PRO ACCOUNT STORE</title>

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}
h1{ color:#00ffe7; }

.notice{
    background:#ff004c;
    padding:10px;
    font-weight:bold;
}

.menu{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:10px;
    flex-wrap:wrap;
}

.container{
    width:95%;
    max-width:600px;
    margin:auto;
}

.card{
    background:rgba(255,255,255,0.08);
    padding:15px;
    margin:15px 0;
    border-radius:15px;
}

input,select,button,textarea{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:10px;
}

input,select,textarea{
    background:#111;
    color:white;
}

button{
    background:#00ffe7;
    font-weight:bold;
    cursor:pointer;
}

.search-box{
    display:flex;
    gap:5px;
}

.search-box input{
    flex:1;
}

.search-btn{
    width:60px;
}

.delete-btn{
    background:#ff0033;
    color:white;
}

.order-btn{
    background:#25D366;
    color:white;
}

.account-card{
    background:#111;
    padding:12px;
    border-radius:12px;
    margin:15px 0;
}

.account-card img{
    width:100%;
    border-radius:10px;
    margin-bottom:10px;
}

.reply-box{
    background:#003f4f;
    padding:8px;
    border-radius:8px;
    margin-top:8px;
}

.sold-text{
    color:red;
    font-weight:bold;
}
</style>
</head>
<body>

<h1>🔥 PRO ACCOUNT STORE</h1>

<div class="notice">
📢 Account sell කරගන්න නම් 0741962754 number එකට WhatsApp message එකක් දාන්න!
</div>

<div class="menu">
<button onclick="showHome()">🏠 Store</button>
<button onclick="showFeedback()">⭐ Feedback</button>
<button onclick="showSold()">🔥 Sold Out</button>
</div>

<div class="container">

<!-- STORE PAGE -->
<div id="storePage">

<div class="card">
<h3>🔍 Search Account by Code</h3>
<div class="search-box">
<input type="text" id="searchCode" placeholder="Enter Account Code">
<button class="search-btn" onclick="searchAccount()">🔍</button>
</div>
</div>

<div class="card">
<h3>Admin Upload</h3>
<input type="password" id="adminPass" placeholder="Admin Password">
<input type="text" id="gameName" placeholder="Game Name">
<input type="text" id="accountId" placeholder="Account ID">
<input type="text" id="price" placeholder="Price">
<input type="file" id="photo" accept="image/*">
<button onclick="uploadAccount()">Upload Account</button>
</div>

<div class="card">
<h3>Available Accounts (<span id="availableCount">0</span>)</h3>
<div id="accountsList"></div>
</div>

</div>

<!-- FEEDBACK PAGE -->
<div id="feedbackPage" style="display:none;">

<div class="card">
<h3>⭐ Give Feedback</h3>
<input type="text" id="userName" placeholder="Your Name">
<textarea id="userFeedback" placeholder="Your Feedback"></textarea>
<button onclick="submitFeedback()">Submit Feedback</button>
</div>

<div class="card">
<h3>All Feedback</h3>
<div id="feedbackList"></div>
</div>

</div>

<!-- SOLD PAGE -->
<div id="soldPage" style="display:none;">
<div class="card">
<h3 style="color:red;">🔥 SOLD OUT ACCOUNTS</h3>
<div id="soldList"></div>
</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAv_PnuprSm5vmakq4cBVgZhowPr_LTQsM",
  authDomain: "acccountsotr.firebaseapp.com",
  databaseURL: "https://acccountsotr-default-rtdb.firebaseio.com",
  projectId: "acccountsotr",
  storageBucket: "acccountsotr.appspot.com",
  messagingSenderId: "664582343553",
  appId: "1:664582343553:web:75114276c0fc0a2400f680"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const accountsRef = ref(db,"accounts");
const feedbackRef = ref(db,"feedback");

let allAccounts=[];

/* RANDOM CODE */
function generateCode(){
    const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    let result="ACC-";
    for(let i=0;i<6;i++){
        result+=chars.charAt(Math.floor(Math.random()*chars.length));
    }
    return result;
}

/* DATE FORMAT */
function formatDateTime(timestamp){
    const d=new Date(timestamp);
    return d.toLocaleDateString()+" | "+d.toLocaleTimeString();
}

/* UPLOAD */
window.uploadAccount=function(){

    if(adminPass.value!=="15013"){
        alert("Wrong Password");
        return;
    }

    const file=photo.files[0];
    if(!file){ alert("Add Photo"); return;}

    const reader=new FileReader();

    reader.onload=function(e){

        push(accountsRef,{
            code:generateCode(),
            game:gameName.value,
            accountId:accountId.value,
            price:price.value,
            photo:e.target.result,
            createdAt:Date.now(),
            sold:false
        });

        alert("Uploaded!");
    }

    reader.readAsDataURL(file);
}

/* MARK SOLD */
window.markSold=function(id){
    const pass=prompt("Enter Admin Password:");
    if(pass!=="15013"){ alert("Wrong Password"); return;}
    update(ref(db,"accounts/"+id),{sold:true});
}

/* DELETE */
window.deleteAccount=function(id){
    const pass=prompt("Enter Admin Password:");
    if(pass!=="15013"){ alert("Wrong Password"); return;}
    remove(ref(db,"accounts/"+id));
}

/* SEARCH */
window.searchAccount=function(){
    const val=searchCode.value.toUpperCase();
    const filtered=allAccounts.filter(a=>a.code===val && !a.sold);
    displayAccounts(filtered);
}

/* DISPLAY */
function displayAccounts(customList=null){

    accountsList.innerHTML="";
    soldList.innerHTML="";

    const list = customList || allAccounts;
    let availableCounter = 0;

    list
    .sort((a,b)=>b.createdAt-a.createdAt)
    .forEach(acc=>{

        const message=`Hi I want this account\nCode: ${acc.code}`;
        const whatsapp=`https://wa.me/94741962754?text=${encodeURIComponent(message)}`;

        if(acc.sold){

            soldList.innerHTML+=`
            <div class="account-card">
            <img src="${acc.photo}">
            <b>${acc.game}</b>
            <p>Code: ${acc.code}</p>
            <p>ID: ${acc.accountId}</p>
            <p>💰 ${acc.price}</p>
            <p>📅 ${formatDateTime(acc.createdAt)}</p>
            <p class="sold-text">SOLD OUT</p>
            <button class="delete-btn" onclick="deleteAccount('${acc.key}')">Delete</button>
            </div>
            `;

        }else{

            availableCounter++;

            accountsList.innerHTML+=`
            <div class="account-card">
            <img src="${acc.photo}">
            <b>${acc.game}</b>
            <p>Code: ${acc.code}</p>
            <p>ID: ${acc.accountId}</p>
            <p>💰 ${acc.price}</p>
            <p>📅 ${formatDateTime(acc.createdAt)}</p>
            <a href="${whatsapp}" target="_blank">
            <button class="order-btn">Order</button>
            </a>
            <button onclick="markSold('${acc.key}')">Mark Sold</button>
            <button class="delete-btn" onclick="deleteAccount('${acc.key}')">Delete</button>
            </div>
            `;
        }
    });

    availableCount.innerText = availableCounter;
}

/* LOAD */
onValue(accountsRef,snapshot=>{
    allAccounts=[];
    snapshot.forEach(child=>{
        allAccounts.push({key:child.key,...child.val()});
    });
    displayAccounts();
});

/* FEEDBACK */
window.submitFeedback=function(){
    if(!userName.value||!userFeedback.value){
        alert("Fill all fields");
        return;
    }

    push(feedbackRef,{
        name:userName.value,
        message:userFeedback.value,
        reply:"",
        time:Date.now()
    });

    alert("Feedback Submitted!");
}

window.deleteFeedback=function(id){
    const pass=prompt("Enter Admin Password:");
    if(pass!=="15013"){ alert("Wrong Password"); return;}
    remove(ref(db,"feedback/"+id));
}

window.replyFeedback=function(id){
    const pass=prompt("Enter Admin Password:");
    if(pass!=="15013"){ alert("Wrong Password"); return;}
    const replyText=prompt("Enter Reply:");
    if(!replyText) return;
    update(ref(db,"feedback/"+id),{reply:replyText});
}

onValue(feedbackRef,snapshot=>{
    feedbackList.innerHTML="";
    snapshot.forEach(child=>{
        const data=child.val();
        const key=child.key;

        feedbackList.innerHTML+=`
        <div class="account-card">
        <b>${data.name}</b>
        <p>${data.message}</p>
        ${data.reply?`<div class="reply-box"><b>Admin Reply:</b><p>${data.reply}</p></div>`:""}
        <button onclick="replyFeedback('${key}')">Reply</button>
        <button class="delete-btn" onclick="deleteFeedback('${key}')">Delete</button>
        </div>
        `;
    });
});

/* MENU */
window.showHome=function(){
    storePage.style.display="block";
    feedbackPage.style.display="none";
    soldPage.style.display="none";
}
window.showFeedback=function(){
    storePage.style.display="none";
    feedbackPage.style.display="block";
    soldPage.style.display="none";
}
window.showSold=function(){
    storePage.style.display="none";
    feedbackPage.style.display="none";
    soldPage.style.display="block";
}

</script>

</body>
</html>
