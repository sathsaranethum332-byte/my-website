<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Gaming Match</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
overflow-x:hidden;
background:linear-gradient(-45deg,#0f2027,#240176,#8f00ff,#00f0ff);
background-size:400% 400%;
animation:bgMove 10s infinite linear;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

#menuBtn{
position:fixed;
top:15px;
left:15px;
font-size:28px;
cursor:pointer;
z-index:1000;
}

#sidebar{
position:fixed;
left:-260px;
top:0;
width:250px;
height:100%;
background:#111;
padding:10px;
transition:0.4s;
overflow-y:auto;
z-index:999;
box-shadow:0 0 20px #00f0ff;
}

#sidebar.active{
left:0;
}

#leaderboard div{
background:rgba(255,255,255,0.1);
margin:6px;
padding:8px;
border-radius:8px;
display:flex;
align-items:center;
}

#leaderboard img{
width:35px;
height:35px;
margin-right:8px;
border-radius:50%;
}

#main{
text-align:center;
padding:80px 20px;
}

button{
padding:8px 14px;
margin:5px;
border:none;
border-radius:6px;
cursor:pointer;
background:#00f0ff;
font-weight:bold;
}

#match{
display:none;
animation:techIn 1s ease;
}

@keyframes techIn{
0%{transform:scale(0);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

#match img{
width:120px;
height:120px;
border-radius:50%;
margin:10px;
box-shadow:0 0 20px #00f0ff;
animation:glow 1.5s infinite alternate;
}

@keyframes glow{
from{box-shadow:0 0 10px #00f0ff;}
to{box-shadow:0 0 30px #ff00ff;}
}

.rank-badge{
padding:3px 8px;
border-radius:6px;
font-size:12px;
margin-left:5px;
}

.bronze{background:#cd7f32;}
.silver{background:#c0c0c0;color:black;}
.gold{background:#ffd700;color:black;}
.diamond{background:#00f0ff;color:black;}

#winScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:40px;
animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}
</style>
</head>
<body>

<div id="menuBtn" onclick="toggleMenu()">☰</div>

<div id="sidebar">
<h3>🏆 Leaderboard</h3>
<div id="leaderboard"></div>
</div>

<div id="main">

<div id="login">
<h2>Login</h2>
<input id="name" placeholder="Enter Name"><br>
<input type="file" id="photoInput" accept="image/*"><br>
<button onclick="login()">Login</button>
</div>

<div id="home" style="display:none;">
<button onclick="startTournament()">🏆 Start Tournament</button>
<h2>Online Users</h2>
<div id="users"></div>
</div>

<div id="inviteBox" style="display:none;">
<h3 id="inviteText"></h3>
<button onclick="acceptInvite()">✔ Accept</button>
<button onclick="rejectInvite()">❌ Reject</button>
</div>

<div id="match">
<h2>⚡ PRO BATTLE ROOM ⚡</h2>
<img id="myImg">
<img id="opImg"><br>
<h3>Code: <span id="roomCode"></span></h3>
<input id="codeInput" placeholder="Enter Code">
<button onclick="submitCode()">Send</button>
</div>

</div>

<div id="winScreen">
<h1>🏆 YOU WIN!</h1>
<h2>+4 Coins</h2>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, set, push, onValue, remove, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCdeOF6wcj8JWFlrSEm2WLLyOuiQpE4Qo4",
  authDomain: "evet-1c4e3.firebaseapp.com",
  databaseURL: "https://evet-1c4e3-default-rtdb.firebaseio.com",
  projectId: "evet-1c4e3",
  storageBucket: "evet-1c4e3.firebasestorage.app",
  messagingSenderId: "968008028502",
  appId: "1:968008028502:web:75acc9f0608595280506f7"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let uid,myName,myPhoto,coins=0,currentInvite=null;

signInAnonymously(auth).then(()=>{ uid=auth.currentUser.uid; });

window.toggleMenu=()=>{
document.getElementById("sidebar").classList.toggle("active");
};

function getRank(coins){
if(coins>=100) return {name:"Diamond 💎",class:"diamond"};
if(coins>=50) return {name:"Gold 🥇",class:"gold"};
if(coins>=20) return {name:"Silver 🥈",class:"silver"};
return {name:"Bronze 🥉",class:"bronze"};
}

window.login=()=>{
let file=document.getElementById("photoInput").files[0];
myName=document.getElementById("name").value;

if(!myName){
alert("Enter Name!");
return;
}

if(!file){
alert("Select Photo!");
return;
}

let reader=new FileReader();
reader.onload=function(e){
myPhoto=e.target.result;

set(ref(db,"players/"+uid),{
name:myName,
photo:myPhoto,
coins:0
});

document.getElementById("login").style.display="none";
document.getElementById("home").style.display="block";

loadLeaderboard();
loadUsers();
listenInvites();
};

reader.readAsDataURL(file);
};
function loadUsers(){
onValue(ref(db,"players"),snapshot=>{
let data=snapshot.val();
let usersDiv=document.getElementById("users");
usersDiv.innerHTML="";

for(let id in data){
if(id!==uid){
usersDiv.innerHTML+=`
<div onclick="sendInvite('${id}')">
<img src="${data[id].photo}" width="40">
${data[id].name}
</div>`;
}
}
});
}

window.sendInvite=(id)=>{
set(ref(db,"invites/"+id),{
from:uid,
name:myName,
photo:myPhoto
});
};

function listenInvites(){
onValue(ref(db,"invites/"+uid),snapshot=>{
let data=snapshot.val();
if(data){
currentInvite=data;
document.getElementById("inviteBox").style.display="block";
document.getElementById("inviteText").innerText=data.name+" wants to play!";
}
});
}

window.acceptInvite=()=>{
let roomRef=push(ref(db,"rooms"));
let code=Math.random().toString(36).substring(2,8).toUpperCase();

set(roomRef,{
user1:uid,
user2:currentInvite.from,
code:code,
winner:""
});

remove(ref(db,"invites/"+uid));
startMatch(currentInvite.photo,code);
};

window.rejectInvite=()=>{
remove(ref(db,"invites/"+uid));
document.getElementById("inviteBox").style.display="none";
};

function startMatch(opPhoto,code){
document.getElementById("home").style.display="none";
document.getElementById("inviteBox").style.display="none";
document.getElementById("match").style.display="block";

document.getElementById("myImg").src=myPhoto;
document.getElementById("opImg").src=opPhoto;
document.getElementById("roomCode").innerText=code;
}

window.submitCode=async()=>{
let snap=await get(ref(db,"rooms"));
let rooms=snap.val();

for(let id in rooms){
if(rooms[id].winner===""){
if(document.getElementById("codeInput").value===rooms[id].code){

update(ref(db,"rooms/"+id),{winner:uid});
coins+=4;
update(ref(db,"players/"+uid),{coins:coins});

document.getElementById("winScreen").style.display="flex";

setTimeout(()=>{
document.getElementById("winScreen").style.display="none";
},3000);

loadLeaderboard();
}
}
}
};

function loadLeaderboard(){
onValue(ref(db,"players"),snapshot=>{
let data=snapshot.val();
let board=document.getElementById("leaderboard");
board.innerHTML="";

let arr=Object.values(data||{}).sort((a,b)=>b.coins-a.coins);

arr.forEach(p=>{
let rank=getRank(p.coins);

board.innerHTML+=`
<div>
<img src="${p.photo}">
${p.name}
<span class="rank-badge ${rank.class}">
${rank.name}
</span>
 - ${p.coins}
</div>`;
});
});
}

</script>

</body>
</html>
