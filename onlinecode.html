<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROLLEX ARENA ULTRA</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0f0f1a,#1a1a3a);
color:white;
text-align:center;
}

button{
padding:8px 15px;
border:none;
border-radius:15px;
background:linear-gradient(45deg,#ff00cc,#3333ff);
color:white;
cursor:pointer;
margin:5px;
}

input{
padding:8px;
border-radius:15px;
border:none;
margin:5px;
}

#login{
position:fixed;
width:100%;
height:100vh;
background:#0f0f1a;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:1000;
}

.userCard{
background:#1b1b2f;
padding:10px;
margin:10px;
border-radius:15px;
display:flex;
align-items:center;
justify-content:space-between;
}

.userCard img{
width:45px;
height:45px;
border-radius:50%;
}

.readyRed{color:red;}
.readyGreen{color:lime;}

#game{
display:none;
margin-top:20px;
}
</style>
</head>
<body>

<div id="login">
<h2>Register Once</h2>
<input id="name" placeholder="Name">
<input type="file" id="photo">
<button onclick="register()">ENTER</button>
</div>

<h3 id="coinDisplay"></h3>
<h4 id="unlockText"></h4>

<div id="users"></div>

<div id="invitePopup" style="display:none;"></div>

<div id="game">
<h2>GAME ROOM</h2>

<div>
Player 1: <span id="p1Status" class="readyRed">Not Ready</span><br>
Player 2: <span id="p2Status" class="readyRed">Not Ready</span>
</div>

<button onclick="readyUp()">READY</button>

<h2 id="countdown"></h2>
<h2 id="codeText"></h2>

<input id="codeInput" placeholder="Enter Code">
<button onclick="sendCode()">SEND</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, update, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = { apiKey: "AIzaSyCdeOF6wcj8JWFlrSEm2WLLyOuiQpE4Qo4", authDomain: "evet-1c4e3.firebaseapp.com", databaseURL: "https://evet-1c4e3-default-rtdb.firebaseio.com", projectId: "evet-1c4e3", storageBucket: "evet-1c4e3.appspot.com", messagingSenderId: "968008028502", appId: "1:968008028502:web:75acc9f0608595280506f7" };

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
const auth=getAuth(app);

let uid,myData,currentRoom=null;
let coins=0;
let lifetime=0;

signInAnonymously(auth).then(user=>{
uid=user.user.uid;
checkUser();
});

function checkUser(){
onValue(ref(db,"users/"+uid),snap=>{
if(snap.exists()){
alert("Already Registered!");
}else{
document.getElementById("login").style.display="flex";
}
},{onlyOnce:true});
}

window.register=function(){
const name=document.getElementById("name").value;
const file=document.getElementById("photo").files[0];
if(!name||!file)return alert("Fill all");

const reader=new FileReader();
reader.onload=e=>{
myData={
name:name,
photo:e.target.result,
coins:0,
lifetime:0,
online:true
};
set(ref(db,"users/"+uid),myData);
document.getElementById("login").style.display="none";
start();
};
reader.readAsDataURL(file);
}

function start(){
loadUsers();
listenInvites();
updateUnlock();
}

function loadUsers(){
onValue(ref(db,"users"),snap=>{
let html="";
snap.forEach(c=>{
let d=c.val();
if(c.key!==uid && d.online){
html+=`
<div class="userCard">
<img src="${d.photo}">
<div>${d.name}</div>
<button onclick="invite('${c.key}')">Invite</button>
</div>`;
}
});
document.getElementById("users").innerHTML=html;
});
}

window.invite=function(id){
set(ref(db,"invites/"+id),{
from:uid
});
}

function listenInvites(){
onValue(ref(db,"invites/"+uid),snap=>{
if(snap.exists()){
let from=snap.val().from;
document.getElementById("invitePopup").innerHTML=
`
<h3>Invite Received</h3>
<button onclick="accept('${from}')">Accept</button>
<button onclick="reject('${from}')">Reject</button>
`;
document.getElementById("invitePopup").style.display="block";
}
});
}

window.accept=function(from){
currentRoom=[uid,from].sort().join("_");
set(ref(db,"rooms/"+currentRoom),{
p1:uid,
p2:from,
ready:{},
coins:{}
});
remove(ref(db,"invites/"+uid));
document.getElementById("invitePopup").style.display="none";
enterGame();
}

window.reject=function(from){
alert("Rejected");
remove(ref(db,"invites/"+uid));
}

function enterGame(){
document.getElementById("game").style.display="block";
listenRoom();
}

function readyUp(){
update(ref(db,"rooms/"+currentRoom+"/ready/"+uid),true);
}

function listenRoom(){
onValue(ref(db,"rooms/"+currentRoom),snap=>{
let d=snap.val();
if(!d)return;

let r1=d.ready[d.p1];
let r2=d.ready[d.p2];

document.getElementById("p1Status").className=r1?"readyGreen":"readyRed";
document.getElementById("p2Status").className=r2?"readyGreen":"readyRed";

if(r1 && r2){
startCountdown();
}
});
}

function startCountdown(){
let c=10;
let timer=setInterval(()=>{
document.getElementById("countdown").innerText=c;
c--;
if(c<0){
clearInterval(timer);
generateCode();
}
},1000);
}

function generateCode(){
let code=Math.random().toString(36).substring(2,7).toUpperCase();
update(ref(db,"rooms/"+currentRoom),{code:code,answered:false});
document.getElementById("codeText").innerText=code;
}

window.sendCode=function(){
onValue(ref(db,"rooms/"+currentRoom),snap=>{
let d=snap.val();
if(!d.answered && document.getElementById("codeInput").value===d.code){
update(ref(db,"rooms/"+currentRoom),{answered:true,winner:uid});
coins+=4;
update(ref(db,"users/"+uid),{coins:coins});
checkWin();
}
},{onlyOnce:true});
}

function checkWin(){
if(coins>=1500){
alert("YOU WIN GAME!");
lifetime+=coins;
update(ref(db,"users/"+uid),{lifetime:lifetime,coins:0});
coins=0;
}
updateUnlock();
document.getElementById("coinDisplay").innerText="Coins: "+coins;
}

function updateUnlock(){
let txt="";
if(coins>=3000) txt+="WeeklyLite Unlocked! ";
if(coins>=6000) txt+="Weekly Unlocked!";
document.getElementById("unlockText").innerText=txt;
}

</script>
</body>
</html>
