<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROLLEX ARENA PRO</title>

<style>
body{
margin:0;
font-family:'Segoe UI', sans-serif;
background:linear-gradient(135deg,#0f0f1a,#1a1a3a);
color:white;
overflow-x:hidden;
}

/* HEADER */
.header{
text-align:center;
padding:18px;
font-size:22px;
font-weight:bold;
background:#14142b;
box-shadow:0 0 15px #6c63ff;
}

.menuBtn{
position:absolute;
left:15px;
top:18px;
font-size:22px;
cursor:pointer;
}

#sidebar{
position:fixed;
left:-220px;
top:0;
width:200px;
height:100vh;
background:#111122;
transition:0.3s;
padding-top:60px;
z-index:2000;
}
#sidebar.active{left:0;}
#sidebar button{display:block;width:90%;margin:10px auto;}

#login{
position:fixed;
width:100%;
height:100vh;
background:#0f0f1a;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:1000;
}

input{
padding:12px;
margin:10px;
border-radius:20px;
border:none;
width:250px;
}

button{
padding:10px 20px;
border:none;
border-radius:20px;
background:linear-gradient(45deg,#ff00cc,#3333ff);
color:white;
cursor:pointer;
box-shadow:0 0 10px #ff00cc;
}

#users{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.userCard{
display:flex;
align-items:center;
background:#1b1b2f;
padding:10px 15px;
border-radius:15px;
margin:10px;
cursor:pointer;
min-width:200px;
}
.userCard img{
width:50px;
height:50px;
border-radius:50%;
margin-right:10px;
border:2px solid #00ff88;
}

#match{
display:none;
position:fixed;
width:100%;
height:100vh;
background:#0f0f1a;
text-align:center;
padding-top:60px;
z-index:999;
}

.vs{
display:flex;
justify-content:center;
gap:60px;
margin-top:40px;
}

.vs img{
width:120px;
height:120px;
border-radius:50%;
border:4px solid gold;
}

.notification{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:red;
padding:10px 20px;
border-radius:10px;
z-index:5000;
}
</style>
</head>
<body>

<div class="header">
<div class="menuBtn" onclick="toggleMenu()">☰</div>
🎮 ROLLEX ARENA
</div>

<div id="sidebar">
<div style="text-align:right;padding:10px;">
<span onclick="toggleMenu()" style="cursor:pointer;">❌</span>
</div>
<button onclick="location.reload()">🚪 Logout</button>
</div>

<div id="login">
<h2>Login</h2>
<input id="name" placeholder="Enter Name">
<input type="file" id="photo">
<button onclick="login()">ENTER</button>
</div>

<div id="users"></div>

<div id="match">
<button onclick="backHome()">⬅ Back</button>
<div class="vs">
<img id="me">
<img id="op">
</div>
<h2 id="code"></h2>
<input id="codeInput" placeholder="Enter Code">
<button onclick="checkCode()">Send</button>
<h3 id="coinText">Coins: 0</h3>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, update, onValue, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCdeOF6wcj8JWFlrSEm2WLLyOuiQpE4Qo4",
  authDomain: "evet-1c4e3.firebaseapp.com",
  databaseURL: "https://evet-1c4e3-default-rtdb.firebaseio.com",
  projectId: "evet-1c4e3",
  storageBucket: "evet-1c4e3.appspot.com",
  messagingSenderId: "968008028502",
  appId: "1:968008028502:web:75acc9f0608595280506f7"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let uid, myData;
let coins=0;
let currentRoom=null;

signInAnonymously(auth).then(user=>{
uid=user.user.uid;
});
window.login=function(){
const name=document.getElementById("name").value;
const file=document.getElementById("photo").files[0];
if(!name||!file){alert("Fill all fields");return;}

const reader=new FileReader();
reader.onload=e=>{

const userRef=ref(db,"users/"+uid);

onValue(userRef,snap=>{

if(!snap.exists()){
  
  // 🟢 FIRST TIME LOGIN
  myData={
    name,
    photo:e.target.result,
    coins:10,
    online:true,
    firstLogin:false
  };

  set(userRef,myData);
  showNotify("🎁 First Login Bonus +10 Coins");

}else{

  // 🔁 RETURN USER
  let oldData=snap.val();
  myData={
    name:oldData.name,
    photo:oldData.photo,
    coins:oldData.coins || 0,
    online:true,
    firstLogin:false
  };

  update(userRef,{online:true});
}

onDisconnect(userRef).update({online:false});

coins=myData.coins;
document.getElementById("coinText").innerText="Coins: "+coins;

document.getElementById("login").style.display="none";

loadUsers();
listenInvites();
listenRoomActivation();

},{onlyOnce:true});

};

reader.readAsDataURL(file);
};
/* LOAD USERS */
function loadUsers(){
onValue(ref(db,"users"),snap=>{
let html="<h2 align='center'>🟢 Online Players</h2>";
snap.forEach(c=>{
let d=c.val();
if(c.key!==uid && d.online){
html+=`
<div class="userCard" onclick="sendInvite('${c.key}')">
<img src="${d.photo}">
<div>${d.name}</div>
</div>`;
}
});
document.getElementById("users").innerHTML=html;
});
}

/* SEND INVITE */
window.sendInvite=function(opponentId){
const roomId=[uid,opponentId].sort().join("_");
set(ref(db,"rooms/"+roomId),{
player1:uid,
player2:opponentId,
active:false,
answered:false
});
alert("Invite Sent!");
};

/* LISTEN INVITE */
function listenInvites(){
onValue(ref(db,"rooms"),snap=>{
snap.forEach(r=>{
let d=r.val();
if(d.player2===uid && !d.active){
if(confirm("Room Invite Received! Accept?")){
update(ref(db,"rooms/"+r.key),{active:true});
}
}
});
});
}

/* LISTEN ROOM ACTIVATION */
function listenRoomActivation(){
onValue(ref(db,"rooms"),snap=>{
snap.forEach(r=>{
let d=r.val();
if(d.active && (d.player1===uid || d.player2===uid)){
if(currentRoom!==r.key){
enterRoom(r.key,d.player1,d.player2);
}
}
});
});
}

/* ENTER ROOM */
function enterRoom(roomId,p1,p2){
currentRoom=roomId;
document.getElementById("match").style.display="block";
document.getElementById("me").src=myData.photo;

const opponent = (p1===uid?p2:p1);

onValue(ref(db,"users/"+opponent),s=>{
document.getElementById("op").src=s.val().photo;
});

generateCode(roomId);

onValue(ref(db,"rooms/"+roomId),snap=>{
let d=snap.val();

if(d.code){
document.getElementById("code").innerText=d.code;
}

if(d.answered){
if(d.winner===uid){
coins+=4;
update(ref(db,"users/"+uid),{coins});
document.getElementById("coinText").innerText="Coins: "+coins;
showNotify("You Won +4");
}else{
showNotify("Opponent Answered First!");
}
setTimeout(()=>{
update(ref(db,"rooms/"+roomId),{answered:false});
generateCode(roomId);
},3000);
}
});
}

/* GENERATE CODE */
function generateCode(roomId){
const newCode=Math.random().toString(36).substring(2,8).toUpperCase();
update(ref(db,"rooms/"+roomId),{code:newCode});
}

/* CHECK CODE */
window.checkCode=function(){
const input=document.getElementById("codeInput").value;

onValue(ref(db,"rooms/"+currentRoom),snap=>{
let d=snap.val();
if(!d.answered && input===d.code){
update(ref(db,"rooms/"+currentRoom),{
answered:true,
winner:uid
});
}
},{onlyOnce:true});
};

/* BACK */
window.backHome=function(){
document.getElementById("match").style.display="none";
currentRoom=null;
};

/* NOTIFICATION */
function showNotify(msg){
let div=document.createElement("div");
div.className="notification";
div.innerText=msg;
document.body.appendChild(div);
setTimeout(()=>{div.remove();},2000);
}

window.toggleMenu=function(){
document.getElementById("sidebar").classList.toggle("active");
};
</script>
</body>
</html>
