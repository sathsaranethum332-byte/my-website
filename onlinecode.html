<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROLLEX ARENA ULTRA</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0f0f1a,#1a1a3a);
color:white;
text-align:center;
}

button{
padding:8px 15px;
border:none;
border-radius:15px;
background:linear-gradient(45deg,#ff00cc,#3333ff);
color:white;
cursor:pointer;
margin:5px;
}

.userCard{
background:#1b1b2f;
padding:10px;
margin:10px;
border-radius:15px;
display:flex;
align-items:center;
justify-content:space-between;
}

.userCard img{
width:45px;
height:45px;
border-radius:50%;
}
</style>
</head>
<body>

<h2>ONLINE PLAYERS</h2>
<div id="users"></div>

<hr>
<h3>ADMIN PANEL</h3>
<input type="password" id="adminPass" placeholder="Enter Admin Password">
<button onclick="adminLogin()">LOGIN</button>
<div id="adminPanel" style="display:none;"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyCdeOF6wcj8JWFlrSEm2WLLyOuiQpE4Qo4",
authDomain: "evet-1c4e3.firebaseapp.com",
databaseURL: "https://evet-1c4e3-default-rtdb.firebaseio.com",
projectId: "evet-1c4e3"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

function loadUsers(){
onValue(ref(db,"users"),snap=>{
let html="";
let adminHtml="";
snap.forEach(c=>{
let d=c.val();
if(d.online){
html+=`
<div class="userCard">
<img src="${d.photo}">
<div>${d.name}</div>
<a href="game.html?uid=${c.key}">
<button>Invite</button>
</a>
</div>`;

adminHtml+=`
<div class="userCard">
<img src="${d.photo}">
<div>${d.name}</div>
<button onclick="kickUser('${c.key}')">REMOVE</button>
</div>`;
}
});
document.getElementById("users").innerHTML=html;
document.getElementById("adminPanel").innerHTML=adminHtml;
});
}

loadUsers();

window.adminLogin=function(){
if(document.getElementById("adminPass").value==="1234"){
document.getElementById("adminPanel").style.display="block";
alert("Admin Access Granted");
}else{
alert("Wrong Password");
}
}

window.kickUser=function(id){
remove(ref(db,"users/"+id));
alert("User Removed");
}

</script>
</body>
</html>
