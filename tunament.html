<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 ROLLEX FREE FIRE TOURNAMENT 🔥</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:white;
overflow-x:hidden;
}

header{
text-align:center;
padding:20px;
font-size:22px;
font-weight:bold;
letter-spacing:2px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
box-shadow:0 0 20px #00f0ff;
}

.container{
padding:20px;
max-width:1000px;
margin:auto;
}

input{
width:95%;
padding:12px;
margin:8px 0;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.1);
color:white;
outline:none;
}


select{
    
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.1);
color:rgb(0, 0, 0);
outline:none;
}

button{
padding:12px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
background:linear-gradient(45deg,#00f0ff,#ff00c8);
color:white;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00f0ff;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border-radius:20px;
padding:20px;
margin:20px 0;
box-shadow:0 0 20px rgba(0,255,255,0.3);
}

.mode-cards{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.player{
background:rgba(0,0,0,0.4);
padding:10px;
margin:10px 0;
border-radius:10px;
}

.delete-btn{
background:red;
margin-top:5px;
}

.reply-btn{
background:#00ff88;
margin-top:5px;
}

.diamond{
font-size:30px;
animation:shine 2s infinite alternate;
}

@keyframes shine{
from{ text-shadow:0 0 10px cyan;}
to{ text-shadow:0 0 40px magenta;}
}

.loading{
    text-align: center;
position:fixed;
width:100%;
height:100vh;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
font-size:22px;
animation:fadeOut 3s forwards 2s;
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}
</style>
</head>
<body>

<div class="loading">🔥LOADING TOURNAMENT.....</div>

<header>🔥 ROLLEX FREE FIRE 🔥<BR>TOURNAMENT </header>

<div class="container">

<h2>🎯 Register Now</h2>

<input id="realName" placeholder="Real Name">
<input id="phone" placeholder="Phone Number">
<input id="email" placeholder="Email">
<input id="gameName" placeholder="Gaming Name">
<input id="level" placeholder="Level">
<input id="uid" placeholder="Game ID">

<select id="mode">
<option value="Clash Squad">Clash Squad</option>
<option value="Battle Royal">Battle Royal</option>
</select>

<select id="payment">
<option value="Cash">Cash</option>
<option value="Bank Transfer">Bank Transfer</option>
</select>

<p>💰 Payment Amount: <b>Rs.150.00</b></p>

<button id="applyBtn" onclick="applyNow()">🚀 Apply Now</button>
<a href="giveawy.html"><button>BACK</button></a>

<h2>💎 Monthly Grand Prize</h2>
<div class="card">
<div class="diamond">💎💎💎 DIAMOND MEGA REWARD 💎💎💎</div>
<p>Winner gets Huge Diamonds Every Month!</p>
</div>

<h2>🎮 Tournament Modes</h2>

<div class="mode-cards">

<div class="card">
<h3>⚔ Clash Squad (<span id="clashCount">0</span>/24)</h3>
<div id="clashPlayers"></div>
</div>

<div class="card">
<h3>🏹 Battle Royal (<span id="battleCount">0</span>/48)</h3>
<div id="battlePlayers"></div>
</div>

</div>



</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCdeOF6wcj8JWFlrSEm2WLLyOuiQpE4Qo4",
  authDomain: "evet-1c4e3.firebaseapp.com",
  databaseURL: "https://evet-1c4e3-default-rtdb.firebaseio.com",
  projectId: "evet-1c4e3",
  storageBucket: "evet-1c4e3.firebasestorage.app",
  messagingSenderId: "968008028502",
  appId: "1:968008028502:web:0795686262e41bcf0506f7"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.applyNow = function(){

const data={
realName:realName.value,
phone:phone.value,
email:email.value,
gameName:gameName.value,
level:level.value,
uid:uid.value,
mode:mode.value,
payment:payment.value
};

push(ref(db,'players'),data);

alert("Applied Successfully 🔥");
}

onValue(ref(db,'players'),snapshot=>{

clashPlayers.innerHTML="";
battlePlayers.innerHTML="";

let clashTotal=0;
let battleTotal=0;

snapshot.forEach(child=>{
const p=child.val();
const key=child.key;

const div=document.createElement("div");
div.className="player";

div.innerHTML=`
<b>🎮 Gaming Name:</b> ${p.gameName}<br>
<b>🆔 Game ID:</b> ${p.uid}<br>
<b>⭐ Level:</b> ${p.level}<br><br>

<button class="reply-btn" onclick="replyUser('${p.phone}')">📲 Reply</button>
<button class="delete-btn" onclick="deletePlayer('${key}')">🗑 Delete</button>
`;

if(p.mode==="Clash Squad"){
clashPlayers.appendChild(div);
clashTotal++;
}else{
battlePlayers.appendChild(div);
battleTotal++;
}

});

document.getElementById("clashCount").innerText=clashTotal;
document.getElementById("battleCount").innerText=battleTotal;

const selectedMode = document.getElementById("mode").value;
const applyBtn = document.getElementById("applyBtn");

if(
(selectedMode==="Clash Squad" && clashTotal>=24) ||
(selectedMode==="Battle Royal" && battleTotal>=48)
){
applyBtn.disabled=true;
applyBtn.innerText="🔒 SLOT FULL";
applyBtn.style.background="red";
}else{
applyBtn.disabled=false;
applyBtn.innerText="🚀 Apply Now";
applyBtn.style.background="linear-gradient(45deg,#00f0ff,#ff00c8)";
}

});

const ADMIN_PASSWORD = "15013";

window.deletePlayer = function(key){

const pass = prompt("🔐 Enter Admin Password to Delete:");

if(pass === ADMIN_PASSWORD){

remove(ref(db,'players/'+key));
alert("✅ Player Deleted Successfully");

}else{

alert("❌ Wrong Password! Access Denied");

}

}

window.replyUser = function(phone){

const pass = prompt("🔐 Enter Admin Password to Reply:");

if(pass === ADMIN_PASSWORD){

window.open("https://wa.me/94"+phone+
"?text=🔥TOURNAMENT REPLY:%0A%0A *YOUR PAYMENT SENT IN CASH OR BANK TRANSFER:%0A%0A✅ Your Tournament request accepted.%0A📅 Match date & time will be sent soon."
);

}else{

alert("❌ Wrong Password! Access Denied");

}

}

document.getElementById("mode").addEventListener("change",()=>{
onValue(ref(db,'players'),()=>{});
});

</script>

</body>
</html>
