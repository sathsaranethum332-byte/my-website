<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 PRO Grand Reward</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Poppins',sans-serif;
    background:radial-gradient(circle at top,#0f0c29,#302b63,#24243e);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:#fff;
    overflow:hidden;
}

h2{
    margin-bottom:30px;
    font-weight:900;
    font-size:24px;
    text-shadow:0 0 20px #00f2ff;
}

/* Container */
.container{
    display:flex;
    gap:25px;
    flex-wrap:wrap;
    justify-content:center;
}

/* Card */
.card{
    width:150px;
    height:210px;
    perspective:1000px;
}

.inner{
    width:100%;
    height:100%;
    position:relative;
    transform-style:preserve-3d;
    transition:0.8s;
}

.card.flipped .inner{
    transform:rotateY(180deg);
}

.front,.back{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:18px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:700;
    backface-visibility:hidden;
}

/* Neon Border */
.front{
    background:#111;
    cursor:pointer;
    position:relative;
    overflow:hidden;
}

.front::before{
    content:"";
    position:absolute;
    inset:-2px;
    background:linear-gradient(45deg,#00f2ff,#ff00c8,#00f2ff);
    z-index:-1;
    border-radius:20px;
    animation:neon 4s linear infinite;
}

@keyframes neon{
    0%{filter:hue-rotate(0deg);}
    100%{filter:hue-rotate(360deg);}
}

.back{
    background:linear-gradient(45deg,#ff512f,#dd2476);
    transform:rotateY(180deg);
    font-size:18px;
    box-shadow:0 0 30px #ff00c8;
}

/* Popup */
.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    backdrop-filter:blur(10px);
    background:rgba(0,0,0,0.6);
    display:flex;
    justify-content:center;
    align-items:center;
    transform:scale(0);
    transition:0.4s;
}

.popup.show{
    transform:scale(1);
}

.popup-box{
    background:#111;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 40px #00f2ff;
    width:90%;
    max-width:320px;
}

.popup input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border-radius:10px;
    border:none;
    outline:none;
}

.popup button{
    margin-top:15px;
    width:100%;
    padding:12px;
    border:none;
    background:linear-gradient(45deg,#00f2ff,#ff00c8);
    border-radius:25px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
}

.popup button:hover{
    transform:scale(1.05);
}

/* 📱 Mobile Responsive */
@media(max-width:600px){

.container{
    gap:15px;
}

.card{
    width:110px;   /* Smaller for mobile */
    height:160px;
}

.front,.back{
    font-size:14px;
}

h2{
    font-size:18px;
}

}
</style>
</head>

<body>

<h2>🔥 Pick Your Lucky Card</h2>

<div class="container" id="cards"></div>

<div class="popup" id="idPopup">
<div class="popup-box">
<h3>🎉 You Won 25 Diamonds!</h3>
<p>Enter Your Game ID</p>
<input type="text" id="gameId" placeholder="Enter Game ID">
<button onclick="sendWhatsApp()">Send To WhatsApp</button>
</div>
</div>

<script>

let container=document.getElementById("cards");
let grandIndex=Math.floor(Math.random()*10);

const ADMIN_PASSWORD="1234";

let urlParams=new URLSearchParams(window.location.search);
let isAdmin=false;

if(urlParams.get("admin")===ADMIN_PASSWORD){
isAdmin=true;
console.log("Admin Mode Activated 🔥");
}

for(let i=0;i<10;i++){
let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<div class="inner">
<div class="front">🎁 CARD</div>
<div class="back">${i===grandIndex?"💎 25 Diamonds":"😢 අය හෙට"}</div>
</div>
`;

card.onclick=function(){flipCard(this,i);}
container.appendChild(card);
}

function flipCard(card,index){

let today=new Date().toDateString();
let lastClick=localStorage.getItem("lastPlay");

if(!isAdmin){
if(lastClick===today){
alert("🚫 අය හෙට බොහොම දෙන්න නෑ");
return;
}
localStorage.setItem("lastPlay",today);
}

card.classList.add("flipped");

if(index===grandIndex){
setTimeout(()=>{
document.getElementById("idPopup").classList.add("show");
},1000);
}
}

function sendWhatsApp(){

let id=document.getElementById("gameId").value;

if(id===""){
alert("Enter Game ID");
return;
}

let number="94756706560";
let message=`Hello, I won 25 Diamonds!%0AGame ID: ${id}`;

window.open(`https://wa.me/${number}?text=${message}`,"_blank");
}

</script>
</body>
</html>
